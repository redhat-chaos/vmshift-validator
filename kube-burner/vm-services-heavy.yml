global:
  measurements:
  - name: vmiLatency

jobs:
  - name: vm-services-heavy
    jobType: create
    jobIterations: 1
    qps: 5
    burst: 5
    namespacedIterations: false
    namespace: vm-services
    verifyObjects: true
    errorOnVerify: true
    jobIterationDelay: 1s
    waitWhenFinished: true
    podWait: false
    maxWaitTimeout: 30m
    jobPause: 0s
    cleanup: true
    objects:

    # 10 Fedora VMs with memory-heavy workloads for longer VMIM Running phase
    - objectTemplate: templates/vm-services-heavy.yml
      replicas: 10
      inputVars:
        name: vm-svc
        image: REPLACE_CONTAINER_IMAGE
        user: REPLACE_SSH_USER
        password: REPLACE_VM_PASSWORD
        osLabel: fedora
        sizeLabel: small
        cpuCores: 4
        memory: 8Gi
        storageSize: 5Gi
        storageClassName: REPLACE_STORAGE_CLASS
        sshPublicKey: REPLACE_SSH_PUBLIC_KEY
        targetNode: "REPLACE_TARGET_NODE"
